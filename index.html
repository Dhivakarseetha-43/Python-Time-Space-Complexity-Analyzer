<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Python Complexity Analyzer</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #171a23;
    --border: #2a2e3a;
    --text: #e7e9ee;
    --muted: #9aa0ac;
    --accent: #6ea8fe;
    --accent-hover: #8bb8ff;
    --good: #4caf50;
    --warn: #ff9800;
    --bad: #f44336;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }

  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 24px 32px;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (max-width: 860px) {
    main { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .panel h2 {
    margin: 0 0 12px;
    font-size: 15px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  textarea {
    width: 100%;
    min-height: 420px;
    background: #0c0e13;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: "SFMono-Regular", Consolas, Menlo, monospace;
    font-size: 13.5px;
    line-height: 1.5;
    resize: vertical;
  }

  button {
    margin-top: 12px;
    background: var(--accent);
    color: #08111f;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  .examples { margin-top: 10px; }
  .examples select {
    background: #0c0e13;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 13px;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .metric {
    background: #0c0e13;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .metric .label { color: var(--muted); font-size: 12px; text-transform: uppercase; }
  .metric .value { font-size: 20px; font-weight: 700; margin-top: 2px; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge.yes { background: rgba(244,67,54,0.15); color: var(--bad); }
  .badge.no { background: rgba(76,175,80,0.15); color: var(--good); }

  ul { margin: 0; padding-left: 18px; }
  li { margin-bottom: 4px; font-size: 13.5px; }

  .lines {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .line-chip {
    background: rgba(110,168,254,0.12);
    color: var(--accent);
    border: 1px solid rgba(110,168,254,0.35);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 12.5px;
    font-family: monospace;
  }

  .error-box {
    background: rgba(244,67,54,0.1);
    border: 1px solid rgba(244,67,54,0.4);
    color: #ff8a80;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13.5px;
  }

  .placeholder { color: var(--muted); font-size: 13.5px; }
  .notes-title { color: var(--muted); font-size: 12px; text-transform: uppercase; margin: 14px 0 6px; }
</style>
</head>
<body>

<header>
  <h1>Python Time &amp; Space Complexity Analyzer</h1>
  <p>Paste Python code below. This is an educational MVP for common interview-style snippets, not a production static analyzer.</p>
</header>

<main>
  <section class="panel">
    <h2>Your Code</h2>
    <textarea id="codeInput" spellcheck="false" placeholder="def example(arr):
    for i in range(len(arr)):
        for j in range(len(arr)):
            print(arr[i], arr[j])
"></textarea>

    <div>
      <button id="analyzeBtn">Analyze</button>
    </div>

    <div class="examples">
      <label for="exampleSelect" class="placeholder">Load an example: </label>
      <select id="exampleSelect">
        <option value="">-- choose --</option>
        <option value="nested">Nested loops (O(n^2))</option>
        <option value="single">Single loop (O(n))</option>
        <option value="sort">Sorting (O(n log n))</option>
        <option value="binary">Binary search-ish loop (O(log n))</option>
        <option value="linear_recursion">Factorial recursion (O(n))</option>
        <option value="binary_recursion">Fibonacci recursion (O(2^n))</option>
        <option value="constant">Constant time (O(1))</option>
      </select>
    </div>
  </section>

  <section class="panel">
    <h2>Result</h2>
    <div id="resultArea">
      <p class="placeholder">Analysis results will appear here after you click "Analyze".</p>
    </div>
  </section>
</main>

<script>
const API_URL = "/analyze";

const examples = {
  nested: `def print_pairs(arr):
    for i in range(len(arr)):
        for j in range(len(arr)):
            print(arr[i], arr[j])`,
  single: `def total(arr):
    result = 0
    for x in arr:
        result += x
    return result`,
  sort: `def sorted_copy(arr):
    return sorted(arr)`,
  binary: `def count_halvings(n):
    steps = 0
    while n > 1:
        n //= 2
        steps += 1
    return steps`,
  linear_recursion: `def factorial(n):
    if n <= 1:
        return 1
    return n * factorial(n - 1)`,
  binary_recursion: `def fib(n):
    if n <= 1:
        return n
    return fib(n - 1) + fib(n - 2)`,
  constant: `def add(a, b):
    return a + b`
};

document.getElementById("exampleSelect").addEventListener("change", (e) => {
  const key = e.target.value;
  if (key && examples[key]) {
    document.getElementById("codeInput").value = examples[key];
  }
});

document.getElementById("analyzeBtn").addEventListener("click", async () => {
  const code = document.getElementById("codeInput").value;
  const resultArea = document.getElementById("resultArea");
  const btn = document.getElementById("analyzeBtn");

  if (!code.trim()) {
    resultArea.innerHTML = `<div class="error-box">Please paste some Python code first.</div>`;
    return;
  }

  btn.disabled = true;
  btn.textContent = "Analyzing...";
  resultArea.innerHTML = `<p class="placeholder">Analyzing...</p>`;

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code })
    });

    const data = await res.json();

    if (!res.ok) {
      resultArea.innerHTML = `<div class="error-box">${escapeHtml(data.detail || "Unknown error")}</div>`;
      return;
    }

    renderResult(data);
  } catch (err) {
    resultArea.innerHTML = `<div class="error-box">Network error: ${escapeHtml(String(err))}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Analyze";
  }
});

function renderResult(data) {
  const resultArea = document.getElementById("resultArea");

  const lineChips = (data.detectedLines || []).length
    ? data.detectedLines.map(l => `<span class="line-chip">line ${l}</span>`).join("")
    : `<span class="placeholder">None</span>`;

  const notes = (data.explanation || []).map(n => `<li>${escapeHtml(n)}</li>`).join("");

  resultArea.innerHTML = `
    <div class="result-grid">
      <div class="metric">
        <div class="label">Time Complexity</div>
        <div class="value">${escapeHtml(data.timeComplexity)}</div>
      </div>
      <div class="metric">
        <div class="label">Space Complexity</div>
        <div class="value">${escapeHtml(data.spaceComplexity)}</div>
      </div>
      <div class="metric">
        <div class="label">Loop Nesting Depth</div>
        <div class="value">${data.loopDepth}</div>
      </div>
      <div class="metric">
        <div class="label">Recursion Detected</div>
        <div class="value">
          <span class="badge ${data.recursionDetected ? 'yes' : 'no'}">
            ${data.recursionDetected ? 'Yes' : 'No'}
          </span>
        </div>
      </div>
    </div>

    <div class="label" style="color:var(--muted); font-size:12px; text-transform:uppercase; margin-bottom:6px;">
      Responsible Lines
    </div>
    <div class="lines">${lineChips}</div>

    ${notes ? `<div class="notes-title">Why</div><ul>${notes}</ul>` : ""}
  `;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
</script>

</body>
</html>
